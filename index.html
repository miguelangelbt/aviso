<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Avisos - Puestos</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; text-align: center; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #app-screen { display: none; }
        .box { border: 1px solid #eee; padding: 15px; margin-top: 15px; border-radius: 4px; background: #fafafa; }
        #log-avisos p { margin: 5px 0; font-size: 0.9em; color: #555; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .online-dot { color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="login-screen">
    <h1>Acceso al Puesto</h1>
    <label>Número de tu Puesto:</label>
    <input type="number" id="input-puesto" placeholder="Ej: 5">
    
    <label>Contraseña de Acceso:</label>
    <input type="password" id="input-password" placeholder="Contraseña">
    
    <button id="btn-entrar">Entrar</button>
</div>

<div class="container" id="app-screen">
    <h1>Puesto Actual: <span id="mi-puesto-display"></span></h1>
    <button id="btn-salir" style="background-color: #dc3545;">Cambiar de Puesto / Salir</button>

    <div class="box">
        <h2>Puestos Conectados</h2>
        <p id="lista-conectados">Cargando...</p>
    </div>

    <div class="box">
        <h2>Enviar un Aviso</h2>
        <label>Puestos Destinatarios (separados por coma):</label>
        <input type="text" id="input-destinatarios" placeholder="Ej: 8, 12, 15">
        <button id="btn-enviar">Enviar Aviso</button>
    </div>

    <div class="box">
        <h2>Registro de Actividad</h2>
        <div id="log-avisos"></div>
    </div>
</div>

<!-- Scripts de Firebase (Versión 10 Modular) -->
<script type="module">
    // IMPORTANTE: REEMPLAZA ESTO CON TUS CREDENCIALES DE FIREBASE
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, onDisconnect, update, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDPBayEwZnqLT07PRDrj5au1oDRXQAvBMw",
  authDomain: "avisos-b81b6.firebaseapp.com",
  databaseURL: "https://avisos-b81b6-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "avisos-b81b6",
  storageBucket: "avisos-b81b6.firebasestorage.app",
  messagingSenderId: "664826158550",
  appId: "1:664826158550:web:5290f1c3d93ff256231877"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Variables globales
    let miPuesto = null;
    let timerCascada = null;
    const PASSWORD_CORRECTA = "12345"; // Contraseña temporal, luego la pondremos segura

    // Elementos del DOM
    const uiLogin = document.getElementById('login-screen');
    const uiApp = document.getElementById('app-screen');
    
    // --- LÓGICA DE INICIO DE SESIÓN ---
    // Recordar puesto si ya entró antes
    if(localStorage.getItem('puestoGuardado')) {
        document.getElementById('input-puesto').value = localStorage.getItem('puestoGuardado');
    }

    document.getElementById('btn-entrar').addEventListener('click', () => {
        const puesto = document.getElementById('input-puesto').value.trim();
        const password = document.getElementById('input-password').value;

        if (!puesto) { alert("Introduce un número de puesto"); return; }
        if (password !== PASSWORD_CORRECTA) { alert("Contraseña incorrecta"); return; }

        miPuesto = puesto;
        localStorage.setItem('puestoGuardado', puesto);
        
        // Pedir permisos para notificaciones de Windows
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        iniciarSistema();
    });

    document.getElementById('btn-salir').addEventListener('click', () => {
        // Marcar como desconectado y recargar la página
        set(ref(db, 'conectados/puesto_' + miPuesto), null).then(() => {
            location.reload();
        });
    });

    function iniciarSistema() {
        uiLogin.style.display = 'none';
        uiApp.style.display = 'block';
        document.getElementById('mi-puesto-display').innerText = miPuesto;

        // Anunciar que estoy conectado
        const miRef = ref(db, 'conectados/puesto_' + miPuesto);
        set(miRef, true);
        // Si cierro el navegador, Firebase me borra automáticamente de la lista
        onDisconnect(miRef).remove();

        // Escuchar quién está conectado
        onValue(ref(db, 'conectados'), (snapshot) => {
            const conectados = snapshot.val() || {};
            let texto = "";
            for (let p in conectados) {
                texto += `<span class="online-dot">●</span> ${p.replace('puesto_', '')} &nbsp;&nbsp;`;
            }
            document.getElementById('lista-conectados').innerHTML = texto || "Solo tú";
        });

        // Escuchar mis avisos
        escucharAvisos();
    }

    // --- LÓGICA DE AVISOS ---
    document.getElementById('btn-enviar').addEventListener('click', () => {
        const destInput = document.getElementById('input-destinatarios').value;
        if (!destInput) return alert("Pon al menos un destinatario");

        // Convertir "5, 8, 12" en array ["5", "8", "12"]
        const destinatarios = destInput.split(',').map(n => n.trim()).filter(n => n !== "");
        
        enviarAvisoEnCascada(destinatarios);
    });

    function enviarAvisoEnCascada(listaDestinatarios) {
        // Crear un nuevo aviso en la base de datos
        const nuevoAvisoRef = push(ref(db, 'avisos'));
        const idAviso = nuevoAvisoRef.key;

        const datosAviso = {
            emisor: miPuesto,
            destinatarios: listaDestinatarios,
            indiceActual: 0,
            estado: 'pendiente',
            timestamp: Date.now()
        };

        set(nuevoAvisoRef, datosAviso);
        agregarAlLog(`Aviso enviado. Esperando a Puesto ${listaDestinatarios[0]}...`);

        // EL EMISOR CONTROLA LOS 10 SEGUNDOS
        controlarCascada(idAviso, listaDestinatarios, 0);
    }

    function controlarCascada(idAviso, lista, indice) {
        const avisoRef = ref(db, `avisos/${idAviso}`);
        
        timerCascada = setTimeout(() => {
            // Pasaron 10 segundos. Comprobar en qué estado está
            getDatabase().ref(`avisos/${idAviso}/estado`).once('value').then(snap => {
                const estado = snap.val();
                if (estado === 'pendiente') {
                    // No contestó. Pasar al siguiente
                    const nuevoIndice = indice + 1;
                    if (nuevoIndice < lista.length) {
                        agregarAlLog(`Puesto ${lista[indice]} no contestó. Pasando a Puesto ${lista[nuevoIndice]}...`);
                        update(avisoRef, { indiceActual: nuevoIndice });
                        controlarCascada(idAviso, lista, nuevoIndice); // Bucle para el siguiente
                    } else {
                        agregarAlLog(`Ningún destinatario aceptó el aviso.`);
                        update(avisoRef, { estado: 'caducado' });
                    }
                }
            });
        }, 10000); // 10000 milisegundos = 10 segundos
    }

    function escucharAvisos() {
        onValue(ref(db, 'avisos'), (snapshot) => {
            snapshot.forEach((hijo) => {
                const aviso = hijo.val();
                const idAviso = hijo.key;

                // Si es un aviso pendiente y el destinatario actual SOY YO
                if (aviso.estado === 'pendiente' && aviso.destinatarios[aviso.indiceActual] === miPuesto) {
                    
                    // Asegurarnos de no lanzar la notificación dos veces
                    if (!sessionStorage.getItem(`notificado_${idAviso}`)) {
                        sessionStorage.setItem(`notificado_${idAviso}`, 'si');
                        
                        // Lanzar notificación de Windows
                        if (Notification.permission === "granted") {
                            const notificacion = new Notification(`¡AVISO DEL PUESTO ${aviso.emisor}!`, {
                                body: 'Haz clic aquí para aceptarlo.',
                                requireInteraction: true
                            });

                            // Si hace clic en la notificación
                            notificacion.onclick = function() {
                                update(ref(db, `avisos/${idAviso}`), { 
                                    estado: 'aceptado_por_' + miPuesto 
                                });
                                alert("¡Aviso aceptado!");
                                window.focus(); // Trae la ventana al frente
                            };
                        }
                    }
                }

                // Log para el emisor: Si yo lo envié y alguien lo aceptó
                if (aviso.emisor === miPuesto && aviso.estado.startsWith('aceptado_por_')) {
                    if (!sessionStorage.getItem(`log_${idAviso}`)) {
                        sessionStorage.setItem(`log_${idAviso}`, 'si');
                        clearTimeout(timerCascada); // Detener el temporizador de 10s
                        const aceptador = aviso.estado.replace('aceptado_por_', '');
                        agregarAlLog(`✅ El Puesto ${aceptador} ha aceptado tu aviso.`);
                    }
                }
            });
        });
    }

    function agregarAlLog(mensaje) {
        const logDiv = document.getElementById('log-avisos');
        const p = document.createElement('p');
        const hora = new Date().toLocaleTimeString();
        p.innerText = `[${hora}] ${mensaje}`;
        logDiv.prepend(p); // Añade arriba
    }
</script>

</body>
</html>

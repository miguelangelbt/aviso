<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avisos Puestos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #2c3e50; margin-top: 0; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-main { background-color: #3498db; color: white; }
        .btn-main:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; color: white; margin-top: 10px; }
        #app-interface { display: none; }
        .status-box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; border-left: 5px solid #3498db; }
        .dot { height: 10px; width: 10px; background-color: #27ae60; border-radius: 50%; display: inline-block; margin-right: 5px; }
        #log { font-size: 0.85rem; max-height: 150px; overflow-y: auto; background: #333; color: #fff; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card" id="login-form">
    <h2>Acceso al Puesto</h2>
    <input type="number" id="puesto-num" placeholder="Nº de Puesto (ej. 10)">
    <input type="password" id="pass-key" placeholder="Contraseña del sistema">
    <button class="btn-main" id="btn-login">Entrar al Sistema</button>
</div>

<div class="card" id="app-interface">
    <h2>Puesto <span id="display-puesto"></span></h2>
    
    <div class="status-box">
        <strong>Puestos Online:</strong>
        <div id="puestos-online" style="margin-top:5px;"></div>
    </div>

    <input type="text" id="destinatarios" placeholder="Destinatarios (ej: 1, 4, 7)">
    <button class="btn-main" id="btn-enviar">ENVIAR AVISO EN CASCADA</button>
    
    <div id="log"></div>
    <button class="btn-danger" id="btn-logout">Salir / Cambiar Puesto</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, onDisconnect, push, update, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // --- CONFIGURACIÓN DE FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyDPBayEwZnqLT07PRDrj5au1oDRXQAvBMw",
  authDomain: "avisos-b81b6.firebaseapp.com",
  databaseURL: "https://avisos-b81b6-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "avisos-b81b6",
  storageBucket: "avisos-b81b6.firebasestorage.app",
  messagingSenderId: "664826158550",
  appId: "1:664826158550:web:5290f1c3d93ff256231877"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let miPuesto = null;
    let clavePrivada = null;

    // --- SISTEMA DE LOGIN ---
    if(localStorage.getItem('puesto')) {
        document.getElementById('puesto-num').value = localStorage.getItem('puesto');
    }

    document.getElementById('btn-login').onclick = async () => {
        const num = document.getElementById('puesto-num').value;
        const pass = document.getElementById('pass-key').value;

        if(!num || !pass) return alert("Rellena todos los campos");

        // Guardamos temporalmente en memoria, no en el código
        miPuesto = num;
        clavePrivada = pass;
        localStorage.setItem('puesto', num);

        // Pedir permiso notificaciones
        Notification.requestPermission();

        document.getElementById('login-form').style.display = 'none';
        document.getElementById('app-interface').style.display = 'block';
        document.getElementById('display-puesto').innerText = miPuesto;

        conectar();
    };

    function conectar() {
        const estadoRef = ref(db, 'conectados/puesto_' + miPuesto);
        set(estadoRef, { online: true, hora: Date.now() });
        onDisconnect(estadoRef).remove();

        // Escuchar online
        onValue(ref(db, 'conectados'), (snap) => {
            const data = snap.val();
            let lista = "";
            for(let p in data) {
                lista += `<span class="dot"></span> ${p.split('_')[1]} `;
            }
            document.getElementById('puestos-online').innerHTML = lista || "Solo tú";
        });

        escucharAvisos();
    }

    // --- GESTIÓN DE AVISOS ---
    document.getElementById('btn-enviar').onclick = () => {
        const dests = document.getElementById('destinatarios').value.split(',').map(s => s.trim());
        if(dests[0] === "") return alert("Pon destinatarios");

        const nuevoAvisoRef = push(ref(db, 'avisos'));
        const id = nuevoAvisoRef.key;

        const data = {
            id: id,
            emisor: miPuesto,
            lista: dests,
            actual: 0,
            estado: 'pendiente',
            creado: Date.now()
        };

        set(nuevoAvisoRef, data);
        iniciarCascada(id, dests, 0);
    };

    function iniciarCascada(id, lista, idx) {
        addLog(`Aviso enviado a Puesto ${lista[idx]}...`);
        
        setTimeout(async () => {
            const snap = await get(ref(db, `avisos/${id}`));
            const aviso = snap.val();

            if(aviso && aviso.estado === 'pendiente' && aviso.actual === idx) {
                const siguiente = idx + 1;
                if(siguiente < lista.length) {
                    addLog(`Puesto ${lista[idx]} ignoró. Saltando a ${lista[siguiente]}`);
                    update(ref(db, `avisos/${id}`), { actual: siguiente });
                    iniciarCascada(id, lista, siguiente);
                } else {
                    addLog(`Nadie aceptó el aviso.`);
                    update(ref(db, `avisos/${id}`), { estado: 'expirado' });
                }
            }
        }, 12000); // 12 segundos para dar margen al sistema
    }

    function escucharAvisos() {
        onValue(ref(db, 'avisos'), (snap) => {
            snap.forEach(child => {
                const aviso = child.val();
                if(aviso.estado === 'pendiente' && aviso.lista[aviso.actual] == miPuesto) {
                    if(!sessionStorage.getItem('aviso_'+aviso.id)) {
                        sessionStorage.setItem('aviso_'+aviso.id, '1');
                        lanzarNotificacion(aviso);
                    }
                }
                if(aviso.emisor == miPuesto && aviso.estado.includes('aceptado')) {
                    addLog(`✅ ACEPTADO por Puesto ${aviso.estado.split('_')[1]}`);
                }
            });
        });
    }

    function lanzarNotificacion(aviso) {
        const n = new Notification("AVISO URGENTE", {
            body: `Puesto ${aviso.emisor} necesita algo. TOCA AQUÍ PARA ACEPTAR.`,
            requireInteraction: true
        });
        n.onclick = () => {
            update(ref(db, `avisos/${aviso.id}`), { estado: 'aceptado_' + miPuesto });
            n.close();
            alert("Has aceptado el aviso correctamente.");
        };
    }

    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML = `<div>> ${msg}</div>` + log.innerHTML;
    }

    document.getElementById('btn-logout').onclick = () => {
        localStorage.clear();
        location.reload();
    };

</script>
</body>
</html>

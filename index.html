<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Avisos</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; background: #f4f4f4; }
        .caja { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        .oculto { display: none; }
        #log { margin-top: 15px; font-size: 13px; color: #444; border-top: 1px solid #ccc; padding-top: 10px; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="pantalla-login" class="caja">
    <h2>Entrar</h2>
    <input type="number" id="puesto" placeholder="Nº de Puesto (Ej: 1)">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="entrar()">Conectar</button>
</div>

<!-- APLICACIÓN -->
<div id="pantalla-app" class="caja oculto">
    <h2 id="titulo"></h2>
    <p>Conectados: <b id="conectados"></b></p>
    
    <input type="text" id="destinos" placeholder="Enviar a (Ej: 2, 3, 4)">
    <button onclick="enviar()">ENVIAR AVISO</button>
    
    <div id="log"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    // Fíjate que hemos añadido 'serverTimestamp' al final de la siguiente línea
    import { getDatabase, ref, set, onValue, onDisconnect, push, update, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 1. TUS CLAVES DE FIREBASE
const db = {
  apiKey: "AIzaSyDPBayEwZnqLT07PRDrj5au1oDRXQAvBMw",
  authDomain: "avisos-b81b6.firebaseapp.com",
  databaseURL: "https://avisos-b81b6-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "avisos-b81b6",
  storageBucket: "avisos-b81b6.firebasestorage.app",
  messagingSenderId: "664826158550",
  appId: "1:664826158550:web:5290f1c3d93ff256231877"
};

    // Variables y atajos útiles
    let miPuesto, miPass;
    const $ = (id) => document.getElementById(id);
    const log = (msg) => $('log').innerHTML = `[${new Date().toLocaleTimeString()}] ${msg} <br>` + $('log').innerHTML;

    // 2. FUNCIÓN PARA ENTRAR
    window.entrar = async () => {
        miPuesto = $('puesto').value;
        miPass = $('pass').value;
        if (!miPuesto || !miPass) return alert("Faltan datos");

        try {
            // A. Ponerse online
            const miRef = ref(db, `conectados/puesto_${miPuesto}`);
            await set(miRef, { online: true, auth: miPass }); 
            onDisconnect(miRef).remove(); // Borrar mi luz verde al salir

            // B. Guardar registro de CONEXIÓN en el historial
            const refEntrada = push(ref(db, 'log_sesiones'));
            set(refEntrada, { puesto: miPuesto, evento: "Conexión", timestamp: serverTimestamp(), auth: miPass });

            // C. Preparar registro de DESCONEXIÓN automático
            const refSalida = push(ref(db, 'log_sesiones'));
            onDisconnect(refSalida).set({ puesto: miPuesto, evento: "Desconexión", timestamp: serverTimestamp(), auth: miPass });

            // Cambiar de pantalla
            $('pantalla-login').classList.add('oculto');
            $('pantalla-app').classList.remove('oculto');
            $('titulo').innerText = `Puesto ${miPuesto}`;
            
            Notification.requestPermission();
            iniciarEscuchas();
        } catch(e) {
            alert("Contraseña incorrecta");
        }
    };

    // 3. ESCUCHAR QUÉ PASA EN LA RED
    function iniciarEscuchas() {
        onValue(ref(db, 'conectados'), (snap) => {
            let lista = [];
            snap.forEach(hijo => lista.push(hijo.key.replace('puesto_', '')));
            $('conectados').innerText = lista.join(', ') || "Solo tú";
        });

        onValue(ref(db, 'avisos'), (snap) => {
            snap.forEach(hijo => {
                const aviso = hijo.val();
                if (!aviso || !aviso.lista) return;

                if (aviso.estado === 'pendiente' && aviso.lista[aviso.actual] === miPuesto) {
                    if (!sessionStorage.getItem(hijo.key)) {
                        sessionStorage.setItem(hijo.key, 'notificado');
                        lanzarNotificacion(aviso.emisor, hijo.key);
                    }
                }

                if (aviso.emisor === miPuesto && aviso.estado.includes('aceptado_')) {
                    if (!sessionStorage.getItem('log_'+hijo.key)) {
                        sessionStorage.setItem('log_'+hijo.key, 'ok');
                        log(`✅ Puesto ${aviso.estado.split('_')[1]} aceptó el aviso.`);
                    }
                }
            });
        });
    }

    // 4. ENVIAR AVISO
    window.enviar = () => {
        const dests = $('destinos').value.split(',').map(s => s.trim()).filter(Boolean);
        if (!dests.length) return alert("Pon destinatarios");

        const nuevoAviso = push(ref(db, 'avisos'));
        set(nuevoAviso, { 
            emisor: miPuesto, 
            lista: dests, 
            actual: 0, 
            estado: 'pendiente', 
            timestamp: serverTimestamp(), // Aprovechamos para guardar la hora exacta del aviso
            auth: miPass 
        });
        cascada(nuevoAviso.key, dests, 0);
    };

    // 5. CASCADA (12 Segundos)
    function cascada(id, lista, indice) {
        log(`Enviando a Puesto ${lista[indice]}...`);
        
        setTimeout(async () => {
            const snap = await get(ref(db, `avisos/${id}`));
            const aviso = snap.val();
            
            if (aviso && aviso.estado === 'pendiente' && aviso.actual === indice) {
                if (indice + 1 < lista.length) {
                    update(ref(db, `avisos/${id}`), { actual: indice + 1, auth: miPass });
                    cascada(id, lista, indice + 1);
                } else {
                    update(ref(db, `avisos/${id}`), { estado: 'caducado', auth: miPass });
                    log("❌ Fin. Nadie respondió.");
                }
            }
        }, 12000); 
    }

    // 6. NOTIFICACIÓN DE WINDOWS
    function lanzarNotificacion(emisor, idAviso) {
        const n = new Notification(`AVISO DE PUESTO ${emisor}`, { body: "Haz clic para aceptar" });
        n.onclick = () => {
            update(ref(db, `avisos/${idAviso}`), { estado: `aceptado_${miPuesto}`, auth: miPass });
            n.close();
        };
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Avisos Puestos</title>
    <style>
        :root { --primary: #2563eb; --danger: #dc2626; --bg: #f8fafc; }
        body { font-family: system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; max-width: 500px; border: 1px solid #e2e8f0; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-danger { background: #475569; margin-top: 20px; }
        .puestos-grid { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
        .badge { background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 999px; font-size: 14px; font-weight: 500; }
        #log { background: #1e293b; color: #f1f5f9; padding: 12px; border-radius: 6px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 13px; margin-top: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<!-- PANTALLA DE ACCESO -->
<div class="card" id="login-screen">
    <h2 style="text-align: center; margin-top: 0;">Acceso al Sistema</h2>
    <input type="number" id="num-puesto" placeholder="Tu número de puesto (Ej: 5)">
    <input type="password" id="pass-sistema" placeholder="Contraseña de la red">
    <button id="btn-entrar">Entrar</button>
</div>

<!-- PANTALLA DE LA APLICACIÓN -->
<div class="card hidden" id="app-screen">
    <h2 id="header-puesto" style="margin-top: 0; color: #1e293b;">Puesto</h2>
    
    <div style="background: #f1f5f9; padding: 10px; border-radius: 6px; margin-bottom: 15px;">
        <strong>Conectados ahora:</strong>
        <div id="puestos-online" class="puestos-grid">Cargando...</div>
    </div>
    
    <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0;">
    
    <label style="font-weight: 600; color: #334155;">Enviar aviso a (separar por comas):</label>
    <input type="text" id="lista-dest" placeholder="Ej: 5, 12, 14">
    <button id="btn-enviar">ENVIAR AVISO URGENTE</button>
    
    <div id="log"></div>
    <button id="btn-salir" class="btn-danger">Cerrar Sesión / Cambiar Puesto</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, onDisconnect, push, update, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // ==========================================
    // 1. PEGA AQUÍ TUS DATOS DE FIREBASE
    // ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyDPBayEwZnqLT07PRDrj5au1oDRXQAvBMw",
  authDomain: "avisos-b81b6.firebaseapp.com",
  databaseURL: "https://avisos-b81b6-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "avisos-b81b6",
  storageBucket: "avisos-b81b6.firebasestorage.app",
  messagingSenderId: "664826158550",
  appId: "1:664826158550:web:5290f1c3d93ff256231877"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let miPuesto = null;
    let miPass = null;

    // Recordar número de puesto de la sesión anterior
    if(localStorage.getItem('puesto_guardado')) {
        document.getElementById('num-puesto').value = localStorage.getItem('puesto_guardado');
    }

    // ==========================================
    // 2. LÓGICA DE ENTRADA Y CONTRASEÑA
    // ==========================================
    document.getElementById('btn-entrar').addEventListener('click', async () => {
        const inputPuesto = document.getElementById('num-puesto').value.trim();
        const inputPass = document.getElementById('pass-sistema').value.trim();

        if(!inputPuesto || !inputPass) return alert("Por favor, rellena todos los campos.");

        try {
            // Intentamos registrarnos en Firebase. Si la clave es mala, Firebase dará error.
            const statusRef = ref(db, 'conectados/puesto_' + inputPuesto);
            await set(statusRef, { online: true, auth: inputPass });
            
            // Si llegamos a esta línea, la contraseña era CORRECTA
            miPuesto = inputPuesto;
            miPass = inputPass;
            localStorage.setItem('puesto_guardado', miPuesto);
            
            // Pedimos permisos para notificaciones de Windows
            if (Notification.permission !== "granted") Notification.requestPermission();

            // Cambiamos de pantalla
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('header-puesto').innerText = "Puesto " + miPuesto;

            // Configuramos qué pasa si se cierra la pestaña
            onDisconnect(statusRef).remove();
            
            // Iniciamos la escucha de avisos y usuarios
            iniciarApp();

        } catch (error) {
            alert("Acceso denegado: La contraseña es incorrecta.");
        }
    });

    // ==========================================
    // 3. LÓGICA PRINCIPAL (CONECTADOS Y AVISOS)
    // ==========================================
    function iniciarApp() {
        // Escuchar quién está conectado
        onValue(ref(db, 'conectados'), (snap) => {
            const data = snap.val();
            let html = "";
            for(let p in data) {
                html += `<span class="badge">● ${p.replace('puesto_', '')}</span>`;
            }
            document.getElementById('puestos-online').innerHTML = html || "Solo tú";
        });

        // Escuchar si me envían un aviso o si aceptan el mío
        onValue(ref(db, 'avisos'), (snap) => {
            snap.forEach(child => {
                const aviso = child.val();
                
                // PROTECCIÓN: Si el aviso está corrupto o es de una prueba vieja, lo ignoramos para que no rompa la web
                if (!aviso || !aviso.lista || aviso.actual === undefined) return;
                
                // Me toca recibir a mí
                if(aviso.estado === 'pendiente' && aviso.lista[aviso.actual] === miPuesto) {
                    if(!sessionStorage.getItem('notif_'+aviso.id)) {
                        sessionStorage.setItem('notif_'+aviso.id, 'true');
                        lanzarNotificacionWindows(aviso);
                    }
                }
                
                // Alguien aceptó el aviso que yo envié
                if(aviso.emisor === miPuesto && aviso.estado && aviso.estado.startsWith('aceptado_')) {
                    const aceptador = aviso.estado.replace('aceptado_', '');
                    if(!sessionStorage.getItem('log_aceptado_'+aviso.id)) {
                        sessionStorage.setItem('log_aceptado_'+aviso.id, 'true');
                        escribirLog(`✅ El Puesto ${aceptador} HA ACEPTADO tu aviso.`);
                    }
                }
            });
        });
    }

    // ==========================================
    // 4. ENVIAR AVISOS Y CASCADA DE 12 SEGUNDOS
    // ==========================================
    document.getElementById('btn-enviar').addEventListener('click', () => {
        const dests = document.getElementById('lista-dest').value.split(',').map(s => s.trim()).filter(s => s !== "");
        if(dests.length === 0) return alert("Escribe al menos un destinatario.");

        const nuevoRef = push(ref(db, 'avisos'));
        const avisoData = {
            id: nuevoRef.key,
            emisor: miPuesto,
            lista: dests,
            actual: 0,
            estado: 'pendiente',
            timestamp: Date.now(),
            auth: miPass // Adjuntamos la clave para que Firebase nos deje escribir
        };

        set(nuevoRef, avisoData);
        gestionarCascada(nuevoRef.key, dests, 0);
    });

    function gestionarCascada(id, lista, idx) {
        escribirLog(`Aviso enviado a Puesto ${lista[idx]}. Esperando respuesta...`);
        
        setTimeout(async () => {
            const snap = await get(ref(db, `avisos/${id}`));
            const aviso = snap.val();

            // Si después de 12 segundos sigue pendiente, y el destinatario es el mismo
            if(aviso && aviso.estado === 'pendiente' && aviso.actual === idx) {
                const proximoIdx = idx + 1;
                
                if(proximoIdx < lista.length) {
                    escribirLog(`⏳ Puesto ${lista[idx]} no respondió. Pasando a Puesto ${lista[proximoIdx]}...`);
                    update(ref(db, `avisos/${id}`), { actual: proximoIdx, auth: miPass });
                    gestionarCascada(id, lista, proximoIdx);
                } else {
                    escribirLog(`❌ Aviso finalizado. Ningún puesto respondió.`);
                    update(ref(db, `avisos/${id}`), { estado: 'caducado', auth: miPass });
                }
            }
        }, 12000); // 12000 milisegundos = 12 segundos
    }

    // ==========================================
    // 5. NOTIFICACIONES DE WINDOWS
    // ==========================================
    function lanzarNotificacionWindows(aviso) {
        if (Notification.permission === "granted") {
            const n = new Notification(`¡URGENTE: AVISO DEL PUESTO ${aviso.emisor}!`, {
                body: "Haz clic en esta alerta para ACEPTAR el aviso.",
                requireInteraction: true
            });
            
            n.onclick = () => {
                // Al hacer clic, enviamos a Firebase que lo hemos aceptado
                update(ref(db, `avisos/${aviso.id}`), { 
                    estado: 'aceptado_' + miPuesto,
                    auth: miPass 
                });
                n.close();
                window.focus(); // Trae la ventana del navegador al frente
                alert("¡Has aceptado el aviso con éxito!");
            };
        } else {
            alert(`Tienes un aviso urgente del Puesto ${aviso.emisor}. (Activa las notificaciones en tu navegador)`);
        }
    }

    // ==========================================
    // 6. UTILIDADES
    // ==========================================
    function escribirLog(mensaje) {
        const cajaLog = document.getElementById('log');
        const hora = new Date().toLocaleTimeString();
        cajaLog.innerHTML = `<div><span style="color:#94a3b8">[${hora}]</span> ${mensaje}</div>` + cajaLog.innerHTML;
    }

    document.getElementById('btn-salir').addEventListener('click', async () => {
        // Borramos mi estado de online antes de recargar
        if(miPuesto && miPass) {
            await set(ref(db, 'conectados/puesto_' + miPuesto), null);
        }
        location.reload();
    });
</script>

</body>
</html>
